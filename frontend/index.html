<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm Coordination Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background: #1a1a1a;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #4CAF50;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }

        .swarm-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .swarm-node {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 1.5rem;
            transition: transform 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .swarm-node:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.2);
        }

        .node-status {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4CAF50;
            animation: pulse 2s infinite;
        }

        .node-details {
            margin-top: 1rem;
        }

        .node-details h3 {
            color: #4CAF50;
            margin-bottom: 0.5rem;
        }

        .stats-container {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 2rem;
            margin-top: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }

        .stat-card {
            text-align: center;
            padding: 1rem;
            background: #333;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: scale(1.05);
        }

        .stat-value {
            font-size: 2rem;
            color: #4CAF50;
            margin-bottom: 0.5rem;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        button {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 5px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Swarm Coordination Platform</h1>
            <p>Real-time swarm monitoring and control interface</p>
        </div>

        <div class="controls">
            <button onclick="addNode()">Add Node</button>
            <button onclick="optimizeSwarm()">Optimize Swarm</button>
            <button onclick="pauseSwarm()">Pause Swarm</button>
        </div>

        <div class="swarm-grid" id="swarmGrid"></div>

        <div class="stats-container">
            <h2>Swarm Statistics</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="activeNodes">0</div>
                    <div>Active Nodes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="efficiency">0%</div>
                    <div>Efficiency</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="uptime">0h</div>
                    <div>Uptime</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="tasks">0</div>
                    <div>Tasks Completed</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let nodes = [];
        let nodeCount = 0;

        function addNode() {
            nodeCount++;
            const node = {
                id: nodeCount,
                status: 'active',
                tasks: Math.floor(Math.random() * 100)
            };
            nodes.push(node);
            updateDisplay();
            updateStats();
        }

        function createNodeElement(node) {
            const div = document.createElement('div');
            div.className = 'swarm-node';
            div.innerHTML = `
                <div class="node-status"></div>
                <div class="node-details">
                    <h3>Node ${node.id}</h3>
                    <p>Status: ${node.status}</p>
                    <p>Tasks: ${node.tasks}</p>
                </div>
            `;
            return div;
        }

        function updateDisplay() {
            const grid = document.getElementById('swarmGrid');
            grid.innerHTML = '';
            nodes.forEach(node => {
                grid.appendChild(createNodeElement(node));
            });
        }

        function updateStats() {
            document.getElementById('activeNodes').textContent = nodes.length;
            document.getElementById('efficiency').textContent = 
                Math.floor(Math.random() * 30 + 70) + '%';
            document.getElementById('uptime').textContent = 
                Math.floor(Math.random() * 24) + 'h';
            document.getElementById('tasks').textContent = 
                nodes.reduce((acc, node) => acc + node.tasks, 0);
        }

        function optimizeSwarm() {
            nodes.forEach(node => {
                node.tasks = Math.floor(Math.random() * 100);
            });
            updateDisplay();
            updateStats();
        }

        function pauseSwarm() {
            nodes.forEach(node => {
                node.status = node.status === 'active' ? 'paused' : 'active';
            });
            updateDisplay();
        }

        // Initial nodes
        for(let i = 0; i < 4; i++) {
            addNode();
        }

        // Update stats periodically
        setInterval(updateStats, 5000);
    </script>
</body>
</html>
