<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm Coordination Platform</title>
    <style>
        :root {
            --primary: #2E3440;
            --secondary: #5E81AC;
            --accent: #88C0D0;
            --success: #A3BE8C;
            --text: #ECEFF4;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 1s ease-in;
        }

        .swarm-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .swarm-card {
            background: rgba(94, 129, 172, 0.1);
            border-radius: 10px;
            padding: 1.5rem;
            transition: transform 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .swarm-card:hover {
            transform: translateY(-5px);
        }

        .swarm-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(136, 192, 208, 0.1));
            transition: transform 0.5s ease;
        }

        .swarm-card:hover::before {
            transform: translateX(100%);
        }

        .metrics {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--accent);
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 15px;
            background: var(--success);
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .control-panel {
            background: rgba(94, 129, 172, 0.2);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 2rem;
        }

        .btn {
            background: var(--secondary);
            color: var(--text);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Swarm Coordination Platform</h1>
            <p>Real-time swarm management and monitoring</p>
        </header>

        <div class="control-panel">
            <button class="btn" onclick="initializeSwarm()">Initialize Swarm</button>
            <button class="btn" onclick="optimizeFormation()">Optimize Formation</button>
            <button class="btn" onclick="emergencyStop()">Emergency Stop</button>
        </div>

        <div class="swarm-grid" id="swarmGrid"></div>
    </div>

    <script>
        const swarmData = [
            { id: 1, status: 'Active', battery: '92%', position: '12.3N, 45.6E', task: 'Surveillance' },
            { id: 2, status: 'Active', battery: '87%', position: '12.4N, 45.7E', task: 'Data Collection' },
            { id: 3, status: 'Charging', battery: '23%', position: '12.2N, 45.5E', task: 'Standby' },
            { id: 4, status: 'Active', battery: '95%', position: '12.5N, 45.8E', task: 'Mapping' }
        ];

        function createSwarmCard(data) {
            return `
                <div class="swarm-card">
                    <span class="status-badge">${data.status}</span>
                    <h3>Swarm Unit #${data.id}</h3>
                    <p>Current Task: ${data.task}</p>
                    <div class="metrics">
                        <span>Battery: ${data.battery}</span>
                        <span>Position: ${data.position}</span>
                    </div>
                </div>
            `;
        }

        function initializeSwarm() {
            const grid = document.getElementById('swarmGrid');
            grid.innerHTML = '';
            swarmData.forEach(unit => {
                grid.innerHTML += createSwarmCard(unit);
            });
        }

        function optimizeFormation() {
            const cards = document.querySelectorAll('.swarm-card');
            cards.forEach(card => {
                card.style.animation = 'fadeIn 0.5s ease';
            });
        }

        function emergencyStop() {
            const cards = document.querySelectorAll('.swarm-card');
            cards.forEach(card => {
                card.style.background = 'rgba(191, 97, 106, 0.2)';
                setTimeout(() => {
                    card.style.background = 'rgba(94, 129, 172, 0.1)';
                }, 1000);
            });
        }

        // Initialize on load
        window.onload = initializeSwarm;
    </script>
</body>
</html>
