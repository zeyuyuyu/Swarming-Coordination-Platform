<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm Coordination Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background: #0f0f1a;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #4CAF50;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }

        .swarm-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .swarm-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 1.5rem;
            transition: transform 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .swarm-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.2);
        }

        .swarm-card h3 {
            color: #4CAF50;
            margin-bottom: 1rem;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            color: #4CAF50;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 15px;
            margin-top: 2rem;
        }

        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #45a049;
        }

        #swarm-canvas {
            width: 100%;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            margin-bottom: 2rem;
        }

        .particle {
            position: absolute;
            background: #4CAF50;
            border-radius: 50%;
            pointer-events: none;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Swarm Coordination Platform</h1>
            <p>Real-time swarm behavior visualization and control</p>
        </header>

        <canvas id="swarm-canvas"></canvas>

        <div class="swarm-grid">
            <div class="swarm-card">
                <h3>Swarm Alpha</h3>
                <p>Active coordination pattern: Flocking</p>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value">24</div>
                        <div class="stat-label">Agents</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">98%</div>
                        <div class="stat-label">Efficiency</div>
                    </div>
                </div>
            </div>

            <div class="swarm-card">
                <h3>Swarm Beta</h3>
                <p>Active coordination pattern: Foraging</p>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value">18</div>
                        <div class="stat-label">Agents</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">92%</div>
                        <div class="stat-label">Efficiency</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <h2>Swarm Control Panel</h2>
            <button class="btn" onclick="toggleSimulation()">Start Simulation</button>
            <button class="btn" onclick="resetSimulation()">Reset</button>
        </div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('swarm-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        // Swarm simulation variables
        let particles = [];
        let isSimulating = false;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = 4;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }

            draw() {
                ctx.fillStyle = '#4CAF50';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            if (!isSimulating) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }

        function toggleSimulation() {
            isSimulating = !isSimulating;
            if (isSimulating) {
                animate();
            }
        }

        function resetSimulation() {
            isSimulating = false;
            init();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(particle => particle.draw());
        }

        // Initialize
        init();
        particles.forEach(particle => particle.draw());

        // Responsive canvas
        window.addEventListener('resize', () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            init();
            particles.forEach(particle => particle.draw());
        });
    </script>
</body>
</html>
