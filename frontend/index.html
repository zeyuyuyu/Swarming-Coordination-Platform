<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwarmConnect - Join the Hive!</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
</head>
<body class="bg-gradient-to-br from-purple-900 to-indigo-900 min-h-screen text-white">
    <div id="app" class="container mx-auto px-4 py-8">
        <!-- Gamification Header -->
        <div class="text-center mb-8 animate__animated animate__fadeIn">
            <h1 class="text-5xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500">SwarmConnect</h1>
            <div class="flex justify-center items-center space-x-4">
                <div class="bg-purple-800 rounded-lg p-4 shadow-lg">
                    <span class="text-2xl font-bold" id="swarmPoints">0</span>
                    <p>Swarm Points</p>
                </div>
                <div class="bg-purple-800 rounded-lg p-4 shadow-lg">
                    <span class="text-2xl font-bold" id="rank">Newbie</span>
                    <p>Hive Rank</p>
                </div>
            </div>
        </div>

        <!-- Daily Challenge -->
        <div class="bg-purple-800 rounded-lg p-6 mb-8 animate__animated animate__fadeInUp">
            <h2 class="text-2xl font-bold mb-4">🏆 Daily Challenge</h2>
            <div class="progress-bar bg-purple-600 rounded-full h-4 mb-4">
                <div id="challengeProgress" class="bg-yellow-400 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p class="text-center">Complete today's challenge to earn <span class="text-yellow-400 font-bold">500</span> Swarm Points!</p>
        </div>

        <!-- Social Feed -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-purple-800 rounded-lg p-6 animate__animated animate__fadeInLeft">
                <h2 class="text-2xl font-bold mb-4">🔥 Trending Swarms</h2>
                <div id="trendingSwarms" class="space-y-4">
                    <!-- Dynamically populated -->
                </div>
            </div>

            <!-- Achievement Showcase -->
            <div class="bg-purple-800 rounded-lg p-6 animate__animated animate__fadeInRight">
                <h2 class="text-2xl font-bold mb-4">🎯 Your Achievements</h2>
                <div id="achievements" class="grid grid-cols-3 gap-4">
                    <!-- Achievement badges -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Gamification Logic
        let points = 0;
        const ranks = ['Newbie', 'Scout', 'Worker', 'Elite', 'Queen'];
        
        function addPoints(amount) {
            points += amount;
            document.getElementById('swarmPoints').textContent = points;
            updateRank();
            showRewardAnimation();
        }

        function updateRank() {
            const rankIndex = Math.min(Math.floor(points / 1000), ranks.length - 1);
            document.getElementById('rank').textContent = ranks[rankIndex];
        }

        function showRewardAnimation() {
            const reward = document.createElement('div');
            reward.className = 'fixed text-yellow-400 text-xl font-bold animate__animated animate__bounceOutUp';
            reward.style.left = Math.random() * 80 + 10 + '%';
            reward.style.top = '50%';
            reward.textContent = '+' + points;
            document.body.appendChild(reward);
            setTimeout(() => reward.remove(), 1000);
        }

        // Populate trending swarms
        const trendingData = [
            { name: 'Project Alpha', members: 1234, growth: '+25%' },
            { name: 'Eco Warriors', members: 892, growth: '+15%' },
            { name: 'Tech Innovators', members: 2341, growth: '+40%' }
        ];

        const trendingContainer = document.getElementById('trendingSwarms');
        trendingData.forEach(swarm => {
            const div = document.createElement('div');
            div.className = 'flex justify-between items-center p-3 bg-purple-700 rounded-lg cursor-pointer hover:bg-purple-600 transition';
            div.innerHTML = `
                <span>${swarm.name}</span>
                <div class="text-right">
                    <div class="text-sm">${swarm.members} members</div>
                    <div class="text-green-400">${swarm.growth}</div>
                </div>
            `;
            div.onclick = () => addPoints(100);
            trendingContainer.appendChild(div);
        });

        // Simulate progress
        setInterval(() => {
            const progress = document.getElementById('challengeProgress');
            const currentWidth = parseInt(progress.style.width) || 0;
            if (currentWidth < 100) {
                progress.style.width = (currentWidth + 1) + '%';
                if (currentWidth + 1 === 100) addPoints(500);
            }
        }, 1000);
    </script>
</body>
</html>
